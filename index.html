    <style>
        :root { --accent: #27ae60; --bg: #121212; --card: #1e1e1e; --warning: #e74c3c; --preview: #3498db; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 20px; text-align: center; font-weight: bold; color: #555; cursor: pointer; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .panel { width: 90%; text-align: center; display: none; }
        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; word-wrap: break-word; }
        .big { font-size: 5.5rem; color: var(--accent); line-height: 1; margin: 5px 0; }
        
        .info-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-top: 10px; }
        .dir-text { color: #f1c40f; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px; }
        .rem-val { font-size: 2.8rem; font-weight: 800; color: #fff; }
        .proximity-alert { color: var(--warning) !important; }
        
        /* Next Treatment Styling */
        .next-card { border-top: 2px solid var(--preview); margin-top: 15px; padding-top: 10px; text-align: left; }
        .next-label { color: var(--preview); font-weight: bold; font-size: 0.9rem; margin-bottom: 3px; }
        .next-val { font-size: 1.1rem; color: #bbb; font-style: italic; margin-bottom: 5px; }
        .then-label { color: #888; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
